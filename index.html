<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Validación Trade</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container-fluid p-4">

    <!-- ===================================================== -->
    <!-- HEADER -->
    <!-- ===================================================== -->

    <header class="topbar">

        <div>

            <h2>Dashboard Validación Trade</h2>

            <small id="fechaCarga">

                Sin archivo cargado

            </small>

        </div>

        <div class="acciones">

            <input
                id="excelFile"
                type="file"
                accept=".xlsx,.xls"
                class="form-control">

        </div>

    </header>

    <!-- ===================================================== -->
    <!-- FILTROS -->
    <!-- ===================================================== -->

    <section class="filters">

        <select id="negocioFilter" class="form-select">

            <option value="">Todos los Negocios</option>

        </select>

        <select id="supervisorFilter" class="form-select">

            <option value="">Todos los Supervisores</option>

        </select>

        <select id="distribuidorFilter" class="form-select">

            <option value="">Todos los Distribuidores</option>

        </select>

        <select id="promotorFilter" class="form-select">

            <option value="">Todos los Promotores</option>

        </select>

    </section>

    <!-- ===================================================== -->
    <!-- KPIs -->
    <!-- ===================================================== -->

    <section class="row mt-4 g-4">

        <div class="col-xl-3 col-md-6">

            <div class="kpi-card" id="kpiValidacion">

                <h6>% Validación</h6>

                <h2 id="validacionGeneral">0%</h2>

            </div>

        </div>

        <div class="col-xl-3 col-md-6">

            <div class="kpi-card">

                <h6>Tareas Enviadas</h6>

                <h2 id="tareasEnviadas">0</h2>

            </div>

        </div>

        <div class="col-xl-3 col-md-6">

            <div class="kpi-card">

                <h6>Tareas Validadas</h6>

                <h2 id="tareasValidadas">0</h2>

            </div>

        </div>

        <div class="col-xl-3 col-md-6">

            <div class="kpi-card" id="objetivoCard">

                <h6>Objetivo</h6>

                <h2>46%</h2>

                <small id="objetivoDiff">--</small>

            </div>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- RANKING -->
    <!-- ===================================================== -->

    <section class="row mt-4">

        <div class="col-12">

            <div class="panel">

                <h5>

                    Ranking de Distribuidores

                </h5>

                <canvas id="rankingDistribuidores"></canvas>

            </div>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- SUPERVISORES -->
    <!-- ===================================================== -->

    <section class="row mt-4">

        <div class="col-lg-6">

            <div class="panel">

                <h5>

                    Supervisores

                </h5>

                <div id="supervisoresContainer"></div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="panel">

                <h5>

                    Promotores

                </h5>

                <div id="promotoresContainer"></div>

            </div>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- TABLA -->
    <!-- ===================================================== -->

    <section class="row mt-4">

        <div class="col-12">

            <div class="panel">

                <h5>

                    Validación por Tarea

                </h5>

                <div class="table-responsive">

                    <table class="table table-hover">

                        <thead>

                            <tr>

                                <th>Tarea</th>

                                <th>Enviadas</th>

                                <th>Validadas</th>

                                <th>% Validación</th>

                            </tr>

                        </thead>

                        <tbody id="tablaTareas">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </section>

</div>

<!-- ===================================================== -->
<!-- JAVASCRIPT -->
<!-- ===================================================== -->

<script src="js/config.js"></script>

<script src="js/utils.js"></script>

<script src="js/excel.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/charts.js"></script>

<script src="js/filters.js"></script>

<script src="js/app.js"></script>

</body>

</html>
