<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Validación Trade</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container-fluid">

    <!-- HEADER -->

    <header class="topbar">

        <div>

            <h2>Dashboard Validación Trade</h2>

            <small id="fechaCarga">
                Sin archivo cargado
            </small>

        </div>

        <div class="acciones">

            <input
                type="file"
                id="excelFile"
                accept=".xlsx,.xls"
                class="form-control">

        </div>

    </header>

    <!-- FILTROS -->

    <section class="filters">

        <select id="negocioFilter" class="form-select">
            <option value="Todos">Todos los negocios</option>
            <option value="CZA">CZA</option>
            <option value="Beyond">Beyond</option>
        </select>

        <select id="supervisorFilter" class="form-select">
            <option value="">Todos los Supervisores</option>
        </select>

        <select id="distribuidorFilter" class="form-select">
            <option value="">Todos los Distribuidores</option>
        </select>

    </section>

    <!-- KPI -->

    <section class="row mt-4 g-4">

        <div class="col-lg-3">

            <div class="kpi-card" id="kpiValidacion">

                <h6>% Validación</h6>

                <h2 id="validacionGeneral">
                    0%
                </h2>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="kpi-card">

                <h6>Tareas Enviadas</h6>

                <h2 id="tareasEnviadas">
                    0
                </h2>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="kpi-card">

                <h6>Tareas Validadas</h6>

                <h2 id="tareasValidadas">
                    0
                </h2>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="kpi-card" id="objetivoCard">

                <h6>Objetivo</h6>

                <h2>
                    46%
                </h2>

                <small id="objetivoDiff">

                    --

                </small>

            </div>

        </div>

    </section>

    <!-- GRAFICOS -->

    <section class="row mt-4">

        <div class="col-lg-8">

            <div class="panel">

                <h5>Ranking Distribuidores</h5>

                <canvas id="rankingDistribuidores"></canvas>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="panel">

                <h5>Distribución por Negocio</h5>

                <canvas id="negocioChart"></canvas>

            </div>

        </div>

    </section>

    <!-- SUPERVISORES -->

    <section class="row mt-4">

        <div class="col-lg-6">

            <div class="panel">

                <h5>Supervisores</h5>

                <div id="supervisoresContainer">

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="panel">

                <h5>Promotores</h5>

                <div id="promotoresContainer">

                </div>

            </div>

        </div>

    </section>

    <!-- DETALLE -->

    <section class="row mt-4">

        <div class="col-12">

            <div class="panel">

                <h5>Detalle de Validación por Tarea</h5>

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>Tarea</th>

                            <th>Enviadas</th>

                            <th>Validadas</th>

                            <th>%</th>

                        </tr>

                    </thead>

                    <tbody id="tablaTareas">

                    </tbody>

                </table>

            </div>

        </div>

    </section>

</div>

<!-- JS -->

<script src="js/utils.js"></script>

<script src="js/excel.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/charts.js"></script>

<script src="js/filters.js"></script>

<script src="js/app.js"></script>

</body>

</html>
